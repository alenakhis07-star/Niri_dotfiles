
# Ебани сюда то, что юзаешь
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun -modi drun,run
$browser = firefox
#
#
#                  _            _             _   
#                 | |          | |           | |  
#       __ _ _   _| |_ ___  ___| |_ __ _ _ __| |_ 
#      / _` | | | | __/ _ \/ __| __/ _` | '__| __|
#     | (_| | |_| | || (_) \__ \ || (_| | |  | |_ 
#      \__,_|\__,_|\__\___/|___/\__\__,_|_|   \__|
#
# Черкани важные процессы (по типу демон уведов, бар хуяр итд)
# Либо то, что нравится, я хз:
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swaybg -i Pictures/wallpapers/wallpaper.png

exec-once = hyprctl setcursor Sweet-cursors 24
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec-once = swaync
exec-once = hypridle

exec-once = sleep 2 & waybar
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#
#                      _                                      _    
#                     (_)                                    | |   
#       ___ _ ____   ___ _ __ ___  _ __  _ __ ___   ___ _ __ | |_  
#      / _ \ '_ \ \ / / | '__/ _ \| '_ \| '_ ` _ \ / _ \ '_ \| __| 
#     |  __/ | | \ V /| | | | (_) | | | | | | | | |  __/ | | | |_  
#      \___|_| |_|\_/ |_|_|  \___/|_| |_|_| |_| |_|\___|_| |_|\__| 
#                                                               
# Хоть что-то кроме названия порнухи почитай, а https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = XCURSOR_THEME, Hackneyed-Magenta-Multi-Animated-24px
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME, Hackneyed-Magenta-Multi-Animated-24px

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = SDL_VIDEODRIVER,wayland

env = MOZ_ENABLE_WAYLAND,1

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = OZONE_PLATFORM,wayland

env = LIBVA_DRIVER_NAME, nvidia
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
cursor {
    no_hardware_cursors = true
    inactive_timeout = 3
}
xwayland {
  force_zero_scaling = true
}

ecosystem {
  no_update_news = true
}
#
#
#      _             _                      _    __          _ 
#     | |           | |                    | |  / _|        | |
#     | | ___   ___ | | __   __ _ _ __   __| | | |_ ___  ___| |
#     | |/ _ \ / _ \| |/ /  / _` | '_ \ / _` | |  _/ _ \/ _ \ |
#     | | (_) | (_) |   <  | (_| | | | | (_| | | ||  __/  __/ |
#     |_|\___/ \___/|_|\_\  \__,_|_| |_|\__,_| |_| \___|\___|_|
#
# Бля сдаюсь, если не надо - не читай, если надо - сам найдёшь, заебали рис хуис
general {
    gaps_in = 2
    gaps_out = 5

    border_size = 2

    col.active_border = rgba(e66cd9ff)
    col.inactive_border = rgba(595959aa)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 2
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true


    }
}

animations {
    enabled = yes

    bezier = ease, 0.25, 0.1, 0.25, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.05

    animation = windows, 1, 5,  overshot, gnomed
    animation = windowsOut, 1, 5, ease, slide bottom
    animation = windowsMove, 1, 5, overshot, slide

    animation = layers, 1, 5, ease, gnomed
    animation = fade, 1, 3, ease
    animation = border, 1, 2, ease
    animation = workspaces, 1, 5, overshot, slide
} 


dwindle {
    pseudotile = true 
    preserve_split = true
}

master {
    new_status = master
}


misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = false 
}
#
#      _                   _   
#     (_)                 | |  
#      _ _ __  _ __  _   _| |_ 
#     | | '_ \| '_ \| | | | __|
#     | | | | | |_) | |_| | |_ 
#     |_|_| |_| .__/ \__,_|\__|
#             | |              
#             |_|              
#
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
#
#      _              _     _           _ _                  
#     | |            | |   (_)         | (_)                 
#     | | _____ _   _| |__  _ _ __   __| |_ _ __   __ _ ___  
#     | |/ / _ \ | | | '_ \| | '_ \ / _` | | '_ \ / _` / __| 
#     |   <  __/ |_| | |_) | | | | | (_| | | | | | (_| \__ \ 
#     |_|\_\___|\__, |_.__/|_|_| |_|\__,_|_|_| |_|\__, |___/ 
#                __/ |                             __/ |     
#               |___/                             |___/
#
$mainMod = SUPER 
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = CTRL ALT, del, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, $menu,
bind = , Print, exec, quickshell -c hyprquickshot -n

bind = $mainMod, T, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
 
bind = $mainMod, L, exec,hyprlock
bind = $mainMod, R, exec, ~/.config/hypr/scripts/restore.sh    #waybar
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard.sh # Open clipboard
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh # Select wallpaper
bind = $mainMod SHIFT, V, exec, sh -c 'wl-copy --clear && rm -f ~/.cache/cliphist/db && notify-send "Clipboard" "Cleared buffer and history"'

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic


bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod CTRL, right, workspace, e+1
bind = $mainMod CTRL, left, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow



bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
#
#               _           _                          _            
#              (_)         | |                        | |           
#     __      ___ _ __   __| | _____      ___ __ _   _| | ___  ___  
#     \ \ /\ / / | '_ \ / _` |/ _ \ \ /\ / / '__| | | | |/ _ \/ __| 
#      \ V  V /| | | | | (_| | (_) \ V  V /| |  | |_| | |  __/\__ \ 
#       \_/\_/ |_|_| |_|\__,_|\___/ \_/\_/ |_|   \__,_|_|\___||___/ 
#                                                                   
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
